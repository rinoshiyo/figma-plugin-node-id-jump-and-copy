<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Node ID Jump and Copy</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #111;
    --gray-600: #6b6b6b;
    --gray-400: #9a9a9a;
    --gray-200: #e6e6e6;
    --gray-100: #f3f3f3;
    --sans: -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 12px;
    -webkit-font-smoothing: antialiased;
  }

  .label {
    font-size: 11px;
    color: var(--gray-600);
    margin-bottom: 6px;
  }

  .id-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--gray-200);
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.12s ease;
  }

  .id-card:hover { border-color: var(--ink); }

  .id-card.empty {
    cursor: default;
    background: var(--gray-100);
    border-color: transparent;
  }

  .id-card.empty:hover { border-color: transparent; }

  .id-value {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .id-value.multi {
    font-size: 12px;
    white-space: normal;
    word-break: break-all;
    line-height: 1.5;
  }

  .id-value.empty {
    color: var(--gray-400);
    font-family: var(--sans);
    font-size: 12px;
  }

  .id-value.flash {
    background: var(--ink);
    color: var(--bg);
    padding: 0 4px;
    margin: 0 -4px;
    border-radius: 2px;
    transition: none;
  }

  .copy-icon {
    width: 13px;
    height: 13px;
    color: var(--gray-400);
    flex-shrink: 0;
  }

  .id-card:hover .copy-icon { color: var(--ink); }
  .id-card.empty .copy-icon { display: none; }

  .copied-label {
    display: none;
    flex-shrink: 0;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .id-card.copied .copy-icon { display: none; }
  .id-card.copied .copied-label { display: inline-block; }

  .node-name {
    margin-top: 6px;
    font-size: 11px;
    color: var(--gray-600);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .node-name.hidden { display: none; }

  .selected { margin-top: 16px; }
  .input-row { display: flex; gap: 6px; }

  input[type="text"] {
    flex: 1;
    min-width: 0;
    padding: 9px 10px;
    border: 1px solid var(--gray-200);
    border-radius: 4px;
    background: var(--bg);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.12s ease;
  }

  input[type="text"]:focus { border-color: var(--ink); }
  input[type="text"]::placeholder { color: var(--gray-400); }

  button {
    padding: 0 14px;
    border: 1px solid var(--ink);
    border-radius: 4px;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.12s ease;
  }

  button:hover { opacity: 0.85; }

  .toast {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    padding: 5px 10px;
    background: var(--ink);
    color: var(--bg);
    border-radius: 3px;
    font-size: 11px;
    opacity: 0;
    transition: opacity 0.15s ease;
    pointer-events: none;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="label">Jump to</div>
<div class="input-row">
  <input type="text" id="nodeInput" placeholder="1:234, 1-234, or URL" autocomplete="off" />
  <button id="goBtn">Go</button>
</div>

<div class="selected">
  <div class="label">Selected</div>
  <div class="id-card empty" id="currentId">
    <div class="id-value empty" id="idText">Nothing selected</div>
    <svg class="copy-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5.5" y="5.5" width="8" height="8" rx="1"/>
      <path d="M2.5 10.5V3.5A1 1 0 013.5 2.5h7"/>
    </svg>
    <span class="copied-label">Copied</span>
  </div>
  <div class="node-name hidden" id="nodeName"></div>
</div>

<div class="toast" id="toast">Copied</div>

<script>
  const idText = document.getElementById('idText');
  const idCard = document.getElementById('currentId');
  const nodeName = document.getElementById('nodeName');
  const nodeInput = document.getElementById('nodeInput');
  const toast = document.getElementById('toast');

  let clipboardValue = '';

  function setSingle(id, name) {
    idText.textContent = id;
    idText.classList.remove('empty', 'multi');
    idCard.classList.remove('empty');
    nodeName.textContent = name;
    nodeName.classList.remove('hidden');
    clipboardValue = id;
  }

  function setMulti(ids, count) {
    idText.textContent = ids.join(', ');
    idText.classList.remove('empty');
    idText.classList.add('multi');
    idCard.classList.remove('empty');
    nodeName.textContent = count + ' nodes';
    nodeName.classList.remove('hidden');
    clipboardValue = ids.join(', ');
  }

  function setEmpty() {
    idText.textContent = 'Nothing selected';
    idText.classList.remove('multi');
    idText.classList.add('empty');
    idCard.classList.add('empty');
    nodeName.textContent = '';
    nodeName.classList.add('hidden');
    clipboardValue = '';
  }

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'selection') {
      if (msg.state === 'empty') setEmpty();
      else if (msg.state === 'single') setSingle(msg.id, msg.name);
      else if (msg.state === 'multi') setMulti(msg.ids, msg.count);
      reportHeight();
    }
  };

  function showToast(label) {
    toast.textContent = label || 'Copied';
    toast.classList.add('show');
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
  }

  async function copyToClipboard(text) {
    // 1. 新 API: navigator.clipboard
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch (e) {
      // Permissions Policy で deny される等 → 次へ
    }

    // 2. 旧 API: execCommand('copy')
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '0';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, text.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e) {
      return false;
    }
  }

  idCard.addEventListener('click', async () => {
    if (!clipboardValue) return;
    const ok = await copyToClipboard(clipboardValue);
    if (ok) {
      idCard.classList.add('copied');
      clearTimeout(window.__copiedTimer);
      window.__copiedTimer = setTimeout(() => idCard.classList.remove('copied'), 1200);
    } else {
      showToast('Copy failed');
    }
  });

  function sanitizeOne(raw) {
    let s = raw.trim();
    const m = s.match(/node-id=([^&\s]+)/i);
    if (m) s = decodeURIComponent(m[1]);
    // 許容: 数字 / `:` / `-` / `;` (インスタンス内ノードのチェーン) / `I` (インスタンス prefix)
    return s.replace(/[^\dI:;-]/gi, '').replace(/-/g, ':');
  }

  function sanitizeInput(raw) {
    return raw
      .split(',')
      .map(sanitizeOne)
      .filter(Boolean)
      .join(', ');
  }

  function jumpToNode() {
    const id = nodeInput.value.trim();
    if (!id) return;
    parent.postMessage({ pluginMessage: { type: 'jump', id } }, '*');
  }

  nodeInput.addEventListener('input', () => {
    const cleaned = sanitizeInput(nodeInput.value);
    if (cleaned !== nodeInput.value) {
      const pos = nodeInput.selectionStart;
      nodeInput.value = cleaned;
      try { nodeInput.setSelectionRange(cleaned.length, cleaned.length); } catch (e) {}
    }
  });

  nodeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') jumpToNode();
  });

  // クリックでフォーカス時、 mouseup でカーソル位置に置かれる挙動を回避するため次 tick で全選択
  nodeInput.addEventListener('focus', () => {
    setTimeout(() => nodeInput.select(), 0);
  });

  document.getElementById('goBtn').addEventListener('click', jumpToNode);

  function reportHeight() {
    const h = Math.ceil(document.body.getBoundingClientRect().height);
    parent.postMessage({ pluginMessage: { type: 'resize', height: h } }, '*');
  }

  // フォント読み込み完了を待ってから初回測定（fallback フォントでの誤測定を避ける）
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(reportHeight);
  } else {
    reportHeight();
  }
  new ResizeObserver(reportHeight).observe(document.body);
</script>

</body>
</html>
